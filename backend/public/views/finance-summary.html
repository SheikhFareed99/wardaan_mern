<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finance Summary</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; color: #111827; }
      h1 { margin-bottom: 6px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 16px; }
      .card { border: 1px solid #e5e7eb; border-radius: 6px; padding: 12px; background: #f9fafb; }
      .label { color: #6b7280; font-size: 12px; }
      .value { font-size: 20px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>Finance Summary</h1>
    <p>Placeholder cards for revenue, expenditure, and margin snapshots.</p>

    <div class="grid">
      <div class="card">
        <div class="label">Revenue (30d)</div>
        <div class="value">--</div>
      </div>
      <div class="card">
        <div class="label">Expenditure (30d)</div>
        <div class="value">--</div>
      </div>
      <div class="card">
        <div class="label">Net Margin</div>
        <div class="value">--</div>
      </div>
    </div>
  </body>
</html>
